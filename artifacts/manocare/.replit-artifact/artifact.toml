kind = "web"
previewPath = "/"
title = "ManoCare"
version = "1.0.0"
id = "artifacts/manocare"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20369

[services.development]
run = "pnpm --filter @workspace/manocare run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/manocare", "run", "build" ]
publicDir = "artifacts/manocare/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20369"
BASE_PATH = "/"
